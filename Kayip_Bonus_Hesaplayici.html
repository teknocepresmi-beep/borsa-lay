<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kayıp Bonus Hesaplayıcı</title>
<style>
body{font-family:Arial,sans-serif;background:#0f0f0f;color:#fff;padding:20px}
.card{max-width:500px;margin:auto;background:#181818;padding:20px;border-radius:16px;border:1px solid #333}
h1{font-size:30px;text-align:center}
label{display:block;margin-top:15px;font-weight:bold}
input{width:100%;padding:14px;font-size:24px;border:1px solid #444;border-radius:10px;box-sizing:border-box;background:#242424;color:#fff}
button{width:100%;margin-top:20px;padding:15px;font-size:24px;font-weight:bold;background:#16a34a;color:#fff;border:none;border-radius:10px}
.result{margin-top:20px;border-radius:12px;padding:15px;border:2px solid #444;background:#222}
.result.active{background:#063f1f;border-color:#16a34a}
.big{font-size:54px;font-weight:bold;color:#4ade80;margin-top:8px;min-height:56px}
</style>
</head>
<body>
<div class="card">
<h1>Kayıp Bonus Hesaplayıcı</h1>

<label>Bahis Miktarı (€)</label>
<input id="bahis" type="number" placeholder="1000">

<label>Bonus Oranı (%)</label>
<input id="oran" type="number" placeholder="30">

<button onclick="hesapla()">Hesapla</button>

<div id="box" class="result">
<div>Borsaya yatırılacak tutar (€)</div>
<div id="sonuc" class="big"></div>
</div>

</div>

<script>
function hesapla(){
 const bahis=parseFloat(document.getElementById('bahis').value)||0;
 const oran=parseFloat(document.getElementById('oran').value)||0;

 const bonus=(bahis*oran)/100;
 const yariBonus=bonus/2;
 const yatirilacak=bahis-yariBonus;

 document.getElementById('sonuc').innerHTML=yatirilacak.toFixed(2)+' €';
 document.getElementById('box').classList.add('active');
}
</script>
</body>
</html>
