<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kayıp Bonus Hesaplayıcı</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      padding:20px;
      font-family:Arial,Helvetica,sans-serif;
      background:#0f0f0f;
      color:#ffffff;
    }
    .card{
      max-width:500px;
      margin:0 auto;
      background:#181818;
      border:1px solid #333;
      border-radius:18px;
      padding:22px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }
    h1{
      margin:10px 0 26px;
      text-align:center;
      font-size:32px;
      line-height:1.2;
    }
    label{
      display:block;
      margin-top:16px;
      margin-bottom:8px;
      font-weight:700;
      font-size:18px;
    }
    input{
      width:100%;
      padding:15px;
      font-size:24px;
      border:1px solid #444;
      border-radius:12px;
      background:#242424;
      color:#ffffff;
      outline:none;
    }
    input:focus{
      border-color:#22c55e;
    }
    input::placeholder{
      color:#8f8f8f;
    }
    button{
      width:100%;
      margin-top:22px;
      padding:16px;
      font-size:24px;
      font-weight:800;
      background:#16a34a;
      color:#ffffff;
      border:0;
      border-radius:12px;
      cursor:pointer;
    }
    .result{
      margin-top:22px;
      padding:16px;
      border-radius:14px;
      border:2px solid #444;
      background:#222;
    }
    .result.active{
      background:#063f1f;
      border-color:#22c55e;
    }
    .result-title{
      font-size:18px;
      font-weight:700;
      color:#ffffff;
    }
    .big{
      margin-top:8px;
      min-height:58px;
      font-size:50px;
      font-weight:900;
      color:#4ade80;
      word-break:break-word;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Kayıp Bonus Hesaplayıcı</h1>

    <label for="bahis">Bahis Miktarı (€)</label>
    <input id="bahis" type="number" inputmode="decimal" step="0.01" placeholder="Örn: 1000">

    <label for="oran">Bonus Oranı (%)</label>
    <input id="oran" type="number" inputmode="decimal" step="0.01" placeholder="Örn: 30">

    <button type="button" onclick="hesapla()">Hesapla</button>

    <div id="box" class="result">
      <div class="result-title">Borsaya yatırılacak tutar (€)</div>
      <div id="sonuc" class="big"></div>
    </div>
  </div>

  <script>
    function hesapla(){
      var bahis = parseFloat(document.getElementById('bahis').value) || 0;
      var oran = parseFloat(document.getElementById('oran').value) || 0;

      var bonus = (bahis * oran) / 100;
      var yariBonus = bonus / 2;
      var yatirilacak = bahis - yariBonus;

      document.getElementById('sonuc').innerHTML = yatirilacak.toFixed(2) + ' €';
      document.getElementById('box').classList.add('active');
    }
  </script>
</body>
</html>
